<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200">
  <defs>
    <style>
      text {
        font-family: Inter, -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif;
        fill: #172033;
      }
      .title { font-size: 40px; font-weight: 800; letter-spacing: 0; }
      .subtitle { font-size: 20px; fill: #44546a; }
      .section { font-size: 24px; font-weight: 800; }
      .card-title { font-size: 28px; font-weight: 800; }
      .label { font-size: 19px; font-weight: 800; }
      .body { font-size: 20px; }
      .small { font-size: 18px; }
      .tiny { font-size: 16px; }
      .muted { fill: #5c6b7e; }
      .pill { font-size: 17px; font-weight: 800; }
      .footer { font-size: 17px; fill: #526176; }
    </style>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3f7ee8"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#cf8527"/>
    </marker>
  </defs>

  <rect width="1600" height="1200" fill="#f5f7fb"/>

  <text x="64" y="62" class="title">スナップショット軌道 / ドリフト差分 v0.1</text>
  <text x="64" y="98" class="subtitle">複数のQuest Snapshotを比較し、前進・停滞・ドリフト・リスク上昇を確認する静的プロトタイプ。</text>

  <rect x="64" y="126" width="1472" height="92" rx="20" fill="#edf5ff" stroke="#9bc3ff" stroke-width="2"/>
  <text x="96" y="166" class="section">軌道判定:</text>
  <text x="250" y="166" class="section" fill="#2459b8">COMPOUNDING → READY TO ADVANCE</text>
  <text x="250" y="198" class="body" fill="#9b5f11">ただし RISK RISING</text>
  <rect x="1190" y="150" width="236" height="36" rx="18" fill="#ffffff" stroke="#c7d4e4"/>
  <text x="1218" y="174" class="pill muted">固定サンプル / 実データではない</text>

  <!-- Snapshot 1 -->
  <rect x="64" y="268" width="430" height="484" rx="22" fill="#ffffff" stroke="#cbd6e5" stroke-width="2"/>
  <rect x="96" y="296" width="126" height="34" rx="17" fill="#eef2f7" stroke="#c5d0de"/>
  <text x="122" y="319" class="pill" fill="#5c6b7e">BASELINE</text>
  <text x="96" y="368" class="card-title">Snapshot 1</text>
  <text x="96" y="400" class="body muted">2026-07-01</text>
  <text x="96" y="442" class="section">Gate: PROOF</text>

  <text x="96" y="492" class="label">証拠</text>
  <text x="122" y="524" class="body">出力同等性: UNKNOWN</text>
  <text x="122" y="554" class="body">有料リピート: NONE</text>

  <text x="96" y="606" class="label">リスク</text>
  <text x="122" y="638" class="body">敵圧: MEDIUM</text>
  <text x="122" y="668" class="body">生存/関係: MEDIUM</text>

  <rect x="96" y="704" width="366" height="72" rx="14" fill="#fff8ed" stroke="#e5c389"/>
  <text x="118" y="732" class="label">広げてはいけない境界</text>
  <text x="118" y="762" class="small">汎用自動化プロダクトを作らない</text>

  <rect x="96" y="796" width="366" height="70" rx="14" fill="#ecfaf3" stroke="#a7d7bc"/>
  <text x="118" y="824" class="label">次の一手</text>
  <text x="118" y="854" class="small">比較試用を1回行う</text>

  <!-- Snapshot 2 -->
  <rect x="585" y="268" width="430" height="484" rx="22" fill="#ffffff" stroke="#9fc0f5" stroke-width="3"/>
  <rect x="617" y="296" width="166" height="34" rx="17" fill="#e8f1ff" stroke="#8db8ff"/>
  <text x="646" y="319" class="pill" fill="#2459b8">COMPOUNDING</text>
  <text x="617" y="368" class="card-title">Snapshot 2</text>
  <text x="617" y="400" class="body muted">2026-07-15</text>
  <text x="617" y="442" class="section">Gate: PROOF</text>

  <text x="617" y="492" class="label">証拠</text>
  <text x="643" y="524" class="body">出力同等性: OBSERVED</text>
  <text x="643" y="554" class="body">有料リピート: PARTIAL</text>

  <text x="617" y="606" class="label">リスク</text>
  <text x="643" y="638" class="body">敵圧: MEDIUM</text>
  <text x="643" y="668" class="body">生存/関係: MEDIUM</text>

  <rect x="617" y="704" width="366" height="72" rx="14" fill="#fff8ed" stroke="#e5c389"/>
  <text x="639" y="732" class="label">広げてはいけない境界</text>
  <text x="639" y="762" class="small">1業務から広げない</text>

  <rect x="617" y="796" width="366" height="70" rx="14" fill="#ecfaf3" stroke="#a7d7bc"/>
  <text x="639" y="824" class="label">次の一手</text>
  <text x="639" y="854" class="small">2回目の有料リピートを確認</text>

  <!-- Snapshot 3 -->
  <rect x="1050" y="268" width="400" height="484" rx="22" fill="#ffffff" stroke="#efad55" stroke-width="3"/>
  <rect x="1082" y="296" width="202" height="34" rx="17" fill="#fff3e4" stroke="#efb46b"/>
  <text x="1108" y="319" class="pill" fill="#9b5f11">READY + RISK RISING</text>
  <text x="1082" y="368" class="card-title">Snapshot 3</text>
  <text x="1082" y="400" class="body muted">2026-08-01</text>
  <text x="1082" y="442" class="section">Gate: INCUBATE候補</text>

  <text x="1082" y="492" class="label">証拠</text>
  <text x="1108" y="524" class="body">出力: OBSERVED</text>
  <text x="1108" y="554" class="body">有料リピート: STRONG</text>

  <text x="1082" y="606" class="label">リスク</text>
  <text x="1108" y="638" class="body">敵圧: HIGH</text>
  <text x="1108" y="668" class="body">生存/関係: MEDIUM-HIGH</text>

  <rect x="1082" y="704" width="336" height="72" rx="14" fill="#fff8ed" stroke="#e5c389"/>
  <text x="1104" y="732" class="label">広げてはいけない境界</text>
  <text x="1104" y="762" class="small">安定前にplatform化しない</text>

  <rect x="1082" y="796" width="336" height="70" rx="14" fill="#ecfaf3" stroke="#a7d7bc"/>
  <text x="1104" y="824" class="label">次の一手</text>
  <text x="1104" y="854" class="small">狭いrepeat packageを定義</text>

  <!-- Arrows -->
  <line x1="514" y1="498" x2="564" y2="498" stroke="#3f7ee8" stroke-width="6" marker-end="url(#arrowBlue)"/>
  <rect x="498" y="450" width="120" height="38" rx="19" fill="#edf5ff" stroke="#91bcff"/>
  <text x="526" y="475" class="small" fill="#2459b8">証拠改善</text>

  <line x1="1030" y1="498" x2="1038" y2="498" stroke="#cf8527" stroke-width="6" marker-end="url(#arrowAmber)"/>
  <rect x="1004" y="436" width="150" height="58" rx="20" fill="#fff4e6" stroke="#efbd78"/>
  <text x="1030" y="461" class="small" fill="#9b5f11">Gate上昇候補</text>
  <text x="1040" y="486" class="small" fill="#9b5f11">リスク上昇</text>

  <!-- Drift Delta Panel -->
  <rect x="64" y="786" width="1472" height="204" rx="22" fill="#ffffff" stroke="#ccd8e8" stroke-width="2"/>
  <text x="96" y="832" class="section">Drift Delta Panel</text>

  <rect x="96" y="858" width="430" height="102" rx="16" fill="#f6faff" stroke="#b7cdf0"/>
  <text x="122" y="891" class="label">変化したもの</text>
  <text x="146" y="922" class="small">有料リピート: NONE → PARTIAL → STRONG</text>
  <text x="146" y="950" class="small">出力同等性: UNKNOWN → OBSERVED</text>
  <text x="146" y="978" class="small">Gate: PROOF → INCUBATE候補</text>

  <rect x="585" y="858" width="430" height="102" rx="16" fill="#fffaf2" stroke="#e6c489"/>
  <text x="611" y="891" class="label">リスク変化</text>
  <text x="635" y="922" class="small">敵圧: MEDIUM → HIGH</text>
  <text x="635" y="950" class="small">生存/関係: MEDIUM → MEDIUM-HIGH</text>
  <text x="635" y="978" class="small">進めるが、広げすぎ注意</text>

  <rect x="1058" y="858" width="390" height="102" rx="16" fill="#f0faf4" stroke="#afd8c0"/>
  <text x="1084" y="891" class="label">変わっていないもの</text>
  <text x="1108" y="922" class="small">汎用化禁止</text>
  <text x="1108" y="950" class="small">Human Seat</text>
  <text x="1108" y="978" class="small">Recheck required</text>

  <!-- Codex handoff -->
  <rect x="64" y="1018" width="1472" height="108" rx="22" fill="#eefaf4" stroke="#9ed4b9" stroke-width="2"/>
  <text x="96" y="1058" class="section">次のCodexが引き受けること</text>
  <text x="96" y="1092" class="body">狭い repeat package の定義。ただし platform化・汎用化・外部投稿はまだHOLD。</text>
  <text x="96" y="1122" class="body">Gate変更は人間のSeat確認後。</text>

  <rect x="64" y="1152" width="1472" height="40" rx="12" fill="#ffffff" stroke="#d2dce8"/>
  <text x="92" y="1178" class="footer">表示段階のプロトタイプ。自動スコアリング・予測・ローンチ許可ではない。Quest Snapshot runtime、PDF生成、スクショ自動化、外部投稿はHOLD。</text>
</svg>
