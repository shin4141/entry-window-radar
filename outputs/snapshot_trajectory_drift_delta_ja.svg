<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1220" viewBox="0 0 1440 1220">
  <defs>
    <style>
      text {
        font-family: Inter, -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif;
        fill: #172033;
      }
      .small { font-size: 18px; }
      .body { font-size: 20px; }
      .label { font-size: 22px; font-weight: 700; }
      .title { font-size: 38px; font-weight: 800; }
      .subtitle { font-size: 19px; fill: #43546c; }
      .muted { fill: #5d6b7c; }
      .card-title { font-size: 25px; font-weight: 800; }
      .pill-text { font-size: 18px; font-weight: 800; }
      .footer { font-size: 17px; fill: #556577; }
    </style>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3f7ee8"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d58b22"/>
    </marker>
  </defs>

  <rect width="1440" height="1220" fill="#f6f8fb"/>

  <text x="48" y="58" class="title">Snapshot Trajectory / Drift Delta v0.1</text>
  <text x="48" y="92" class="subtitle">複数のQuest Snapshotを比較し、プロジェクトが前進・停滞・ドリフト・リスク上昇しているかを見る静的プロトタイプ。</text>

  <rect x="48" y="118" width="1344" height="70" rx="18" fill="#eef6ff" stroke="#9cc6ff" stroke-width="2"/>
  <text x="78" y="160" class="label">軌道判定:</text>
  <text x="214" y="160" class="label" fill="#2459b8">COMPOUNDING → READY TO ADVANCE, ただし RISK RISING</text>
  <text x="1068" y="160" class="small muted">固定サンプル / 実データではない</text>

  <!-- Snapshot 1 -->
  <rect x="60" y="232" width="370" height="656" rx="18" fill="#ffffff" stroke="#cbd7e6" stroke-width="2"/>
  <rect x="82" y="254" width="142" height="34" rx="17" fill="#eef2f7" stroke="#c3cedb"/>
  <text x="105" y="277" class="pill-text" fill="#5d6b7c">BASELINE</text>
  <text x="82" y="326" class="card-title">Snapshot 1</text>
  <text x="82" y="356" class="body muted">2026-07-01</text>
  <text x="82" y="397" class="label">Gate: PROOF</text>
  <text x="82" y="429" class="body">Action: PROOF</text>
  <text x="82" y="474" class="label">Evidence</text>
  <text x="100" y="507" class="small">Output Equivalence: UNKNOWN</text>
  <text x="100" y="534" class="small">Paid Repeat: NONE</text>
  <text x="100" y="561" class="small">Reference Chart: CLOSE PROXY</text>
  <text x="82" y="606" class="label">Risk</text>
  <text x="100" y="639" class="small">Enemy: MEDIUM / Survival: MEDIUM</text>

  <rect x="82" y="685" width="326" height="86" rx="12" fill="#fff8ed" stroke="#e7c891"/>
  <text x="102" y="714" class="small" font-weight="700">Do-Not-Do</text>
  <text x="102" y="743" class="small">汎用自動化プロダクトを作らない</text>

  <rect x="82" y="792" width="326" height="72" rx="12" fill="#effaf4" stroke="#a7d7bc"/>
  <text x="102" y="821" class="small" font-weight="700">Next</text>
  <text x="102" y="850" class="small">比較試用を1回行う</text>

  <!-- Snapshot 2 -->
  <rect x="535" y="232" width="370" height="656" rx="18" fill="#ffffff" stroke="#9fc0f5" stroke-width="3"/>
  <rect x="557" y="254" width="170" height="34" rx="17" fill="#e8f1ff" stroke="#8bb8ff"/>
  <text x="586" y="277" class="pill-text" fill="#2459b8">COMPOUNDING</text>
  <text x="557" y="326" class="card-title">Snapshot 2</text>
  <text x="557" y="356" class="body muted">2026-07-15</text>
  <text x="557" y="397" class="label">Gate: PROOF</text>
  <text x="557" y="429" class="body">Action: PROOF</text>
  <text x="557" y="474" class="label">Evidence</text>
  <text x="575" y="507" class="small">Output Equivalence: OBSERVED</text>
  <text x="575" y="534" class="small">Paid Repeat: PARTIAL</text>
  <text x="575" y="561" class="small">Reference Chart: CLOSE PROXY</text>
  <text x="557" y="606" class="label">Risk</text>
  <text x="575" y="639" class="small">Enemy: MEDIUM / Survival: MEDIUM</text>

  <rect x="557" y="685" width="326" height="86" rx="12" fill="#fff8ed" stroke="#e7c891"/>
  <text x="577" y="714" class="small" font-weight="700">Do-Not-Do</text>
  <text x="577" y="743" class="small">1業務から広げない</text>

  <rect x="557" y="792" width="326" height="72" rx="12" fill="#effaf4" stroke="#a7d7bc"/>
  <text x="577" y="821" class="small" font-weight="700">Next</text>
  <text x="577" y="850" class="small">2回目の有料リピートを確認</text>

  <!-- Snapshot 3 -->
  <rect x="970" y="232" width="370" height="656" rx="18" fill="#ffffff" stroke="#f0b35d" stroke-width="3"/>
  <rect x="992" y="254" width="214" height="34" rx="17" fill="#fff3e3" stroke="#efb46b"/>
  <text x="1014" y="277" class="pill-text" fill="#9b5f11">READY + RISK RISING</text>
  <text x="992" y="326" class="card-title">Snapshot 3</text>
  <text x="992" y="356" class="body muted">2026-08-01</text>
  <text x="992" y="397" class="label">Gate: INCUBATE候補</text>
  <text x="992" y="429" class="body">Action: INCUBATE候補</text>
  <text x="992" y="474" class="label">Evidence</text>
  <text x="1010" y="507" class="small">Output: OBSERVED</text>
  <text x="1010" y="534" class="small">Paid Repeat: STRONG</text>
  <text x="1010" y="561" class="small">Ref: DIRECT / CLOSE</text>
  <text x="992" y="606" class="label">Risk</text>
  <text x="1010" y="639" class="small">Enemy: HIGH</text>
  <text x="1010" y="666" class="small">Survival: MEDIUM-HIGH</text>

  <rect x="992" y="685" width="326" height="86" rx="12" fill="#fff8ed" stroke="#e7c891"/>
  <text x="1012" y="714" class="small" font-weight="700">Do-Not-Do</text>
  <text x="1012" y="742" class="small">repeat package が安定するまで</text>
  <text x="1012" y="766" class="small">platform 化しない</text>

  <rect x="992" y="792" width="326" height="86" rx="12" fill="#effaf4" stroke="#a7d7bc"/>
  <text x="1012" y="821" class="small" font-weight="700">Next</text>
  <text x="1012" y="850" class="small">狭い repeat package</text>
  <text x="1012" y="874" class="small">を定義</text>

  <!-- arrows -->
  <line x1="444" y1="438" x2="515" y2="438" stroke="#3f7ee8" stroke-width="5" marker-end="url(#arrowBlue)"/>
  <rect x="424" y="388" width="118" height="36" rx="18" fill="#edf5ff" stroke="#91bcff"/>
  <text x="446" y="412" class="small" fill="#2459b8">証拠改善</text>

  <line x1="919" y1="438" x2="950" y2="438" stroke="#d58b22" stroke-width="5" marker-end="url(#arrowAmber)"/>
  <rect x="884" y="198" width="190" height="36" rx="18" fill="#fff4e6" stroke="#efbd78"/>
  <text x="906" y="222" class="small" fill="#9b5f11">Gate上昇候補 + リスク上昇</text>

  <!-- Drift panel -->
  <rect x="60" y="920" width="1320" height="214" rx="18" fill="#ffffff" stroke="#cbd7e6" stroke-width="2"/>
  <text x="90" y="962" class="label">Drift Delta Panel</text>

  <rect x="90" y="988" width="410" height="120" rx="14" fill="#f8fbff" stroke="#bdd2ee"/>
  <text x="118" y="1020" class="body" font-weight="700">変化したもの</text>
  <text x="136" y="1051" class="small">Paid Repeat: NONE → PARTIAL → STRONG</text>
  <text x="136" y="1079" class="small">Output Equivalence: UNKNOWN → OBSERVED</text>
  <text x="136" y="1107" class="small">Gate: PROOF → INCUBATE候補</text>

  <rect x="525" y="988" width="365" height="120" rx="14" fill="#fffaf2" stroke="#e6c489"/>
  <text x="553" y="1020" class="body" font-weight="700">リスク変化</text>
  <text x="571" y="1051" class="small">Enemy Pressure: MEDIUM → HIGH</text>
  <text x="571" y="1079" class="small">Survival / Relationship:</text>
  <text x="571" y="1107" class="small">MEDIUM → MEDIUM-HIGH</text>

  <rect x="915" y="988" width="435" height="120" rx="14" fill="#f0faf4" stroke="#afd8c0"/>
  <text x="943" y="1020" class="body" font-weight="700">変わっていないもの</text>
  <text x="961" y="1051" class="small">汎用化禁止 / Human Seat</text>
  <text x="961" y="1079" class="small">Codex: repeat package 定義</text>
  <text x="961" y="1107" class="small">Recheck / 投稿HOLD</text>

  <rect x="60" y="1162" width="1320" height="38" rx="10" fill="#ffffff" stroke="#d2dce8"/>
  <text x="86" y="1187" class="footer">表示段階のプロトタイプ。自動スコアリング・予測・ローンチ許可ではない。Quest Snapshot runtime、PDF生成、スクショ自動化、外部投稿はHOLD。</text>
</svg>
