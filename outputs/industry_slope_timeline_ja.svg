<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', sans-serif">
  <title id="title">業界勾配タイムライン v0.1</title>
  <desc id="desc">AI低導入産業の反復業務圧縮について、過去、現在、未来または再評価ゾーンのAs-of位置を示す静的・手動の表示プロトタイプ。</desc>
  <style>
    .bg { fill: #f8fafc; }
    .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; }
    .chart-bg { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.2; }
    .future-zone { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 1; stroke-dasharray: 8 8; }
    .grid { stroke: #e2e8f0; stroke-width: 1; }
    .axis { stroke: #334155; stroke-width: 1.7; }
    .now-line { stroke: #2563eb; stroke-width: 2.2; stroke-dasharray: 7 7; }
    .slope { fill: none; stroke: #2563eb; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
    .slope-shadow { fill: none; stroke: #bfdbfe; stroke-width: 15; stroke-linecap: round; stroke-linejoin: round; }
    .future-path { fill: none; stroke: #94a3b8; stroke-width: 4; stroke-linecap: round; stroke-dasharray: 9 9; }
    .branch-line { fill: none; stroke: #0f766e; stroke-width: 3; stroke-linecap: round; }
    .branch-label { fill: #0f766e; font-size: 12px; font-weight: 700; }
    .uncertainty { fill: #dbeafe; fill-opacity: 0.36; stroke: #93c5fd; stroke-width: 1; }
    .title { fill: #0f172a; font-size: 26px; font-weight: 700; }
    .subtitle { fill: #475569; font-size: 13px; }
    .label { fill: #334155; font-size: 14px; font-weight: 700; }
    .small { fill: #475569; font-size: 12px; }
    .tiny { fill: #64748b; font-size: 11px; }
    .phase { fill: #0f172a; font-size: 12px; font-weight: 700; }
    .note { fill: #334155; font-size: 12px; }
    .badge { fill: #eff6ff; stroke: #93c5fd; stroke-width: 1; }
    .warn { fill: #fff7ed; stroke: #fdba74; stroke-width: 1; }
    .warn-text { fill: #9a3412; font-size: 12px; font-weight: 700; }
    .marker { fill: #2563eb; stroke: #ffffff; stroke-width: 4; }
    .marker-ring { fill: none; stroke: #2563eb; stroke-width: 4; stroke-opacity: 0.72; }
    .card-title { fill: #0f172a; font-size: 22px; font-weight: 700; }
    .card-head { fill: #0f172a; font-size: 14px; font-weight: 700; }
    .card-text { fill: #334155; font-size: 12px; }
    .pill { fill: #dbeafe; stroke: #93c5fd; stroke-width: 1; }
    .next-box { fill: #f0fdf4; stroke: #bbf7d0; stroke-width: 1; }
    .boundary-box { fill: #fff7ed; stroke: #fed7aa; stroke-width: 1; }
    .recheck-box { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1; }
    .footer { fill: #475569; font-size: 12px; }
  </style>

  <rect class="bg" x="0" y="0" width="1200" height="1200"/>
  <text x="40" y="46" class="title">業界勾配タイムライン v0.1</text>
  <text x="40" y="70" class="subtitle">静的・手動の表示プロトタイプ。未来予測・市場規模予測・投資助言ではない。</text>

